<body class="bg-background min-h-screen flex flex-col font-body-lg text-on-background soft-accent-bg">
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile py-xl">
<div class="w-full max-w-md">
<!-- Branding Section -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center p-md bg-secondary-container bubbly-border rounded-xl mb-md bubbly-shadow">
<span class="material-symbols-outlined text-[48px] text-on-secondary-container" data-icon="api" style="font-variation-settings: 'FILL' 0;">api</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">API Lab</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Welcome back! Let's get testing.</p>
</div>
<!-- Login Form Card -->
<div class="bg-surface-container-lowest bubbly-border rounded-xl p-lg bubbly-shadow mb-lg">
<form class="space-y-md">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-button-text text-button-text px-xs" for="email">Work Email</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary" data-icon="mail">mail</span>
<input class="w-full pl-xl pr-md py-md bg-surface bubbly-border rounded-xl focus:ring-0 focus:border-primary focus:border-[3px] transition-all outline-none font-body-lg text-body-lg placeholder:text-outline-variant" id="email" placeholder="dev@company.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-button-text text-button-text" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary" data-icon="lock">lock</span>
<input class="w-full pl-xl pr-md py-md bg-surface bubbly-border rounded-xl focus:ring-0 focus:border-primary focus:border-[3px] transition-all outline-none font-body-lg text-body-lg placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<div class="pt-base">
<button class="w-full bg-primary-container text-on-primary-container font-button-text text-button-text py-md bubbly-border rounded-xl bubbly-shadow active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all flex items-center justify-center gap-base" type="submit">
                            Log In
                            <span class="material-symbols-outlined text-body-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Social/Other Logins (Bento Style) -->
<div class="mt-lg pt-lg border-t-2 border-dotted border-outline-variant">
<p class="text-center font-body-sm text-body-sm text-outline mb-md">Or continue with</p>
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center py-sm bubbly-border rounded-lg bg-surface hover:bg-surface-variant/50 transition-colors">
<img alt="Google" class="w-5 h-5 mr-xs" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCALfZgefzP-cnfjkqsljIS11pSLal6DpbJoqAvJuWH6jTj1KDEra99JEoPMPSsYPvwLlHLUXVr_5uF2wW0pC8zeiedQpKme3ONzepxoPU4231EpNHihcrxqfSwWXSIvLLpM9wPybI-9qnrf3ao7MY-IjFXUM6Pgwiukgv6onHMPNZDsEy5hV2D3UbyZZwqm1X743GC6m9QOldrf5mvIwfW5samLiaC2pO2k2JMKX05WPXyvzShRcjq-bmgdF1lV0mo7S9gZwxqDJw"/>
<span class="font-button-text text-button-text">Google</span>

<span class="material-symbols-outlined text-body-lg mr-xs" data-icon="terminal">terminal</span>
<span class="font-button-text text-button-text">GitHub</span>
</button>
</div>
</div>
</div>
<!-- Footer Link -->
<p class="text-center font-body-lg text-body-lg">
                New to the Lab? 
                <a class="text-primary font-bold hover:underline decoration-2" href="#">Register here</a>
</p>

</div>

</div>
</div>
</div>
