    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-lg min-h-screen pb-xl">
<!-- TopAppBar -->
<header class="bg-background dark:bg-background docked full-width top-0 pt-base flex justify-between items-center px-margin-mobile py-base w-full">
<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-on-surface hover:bg-surface-variant/50 p-2 rounded-lg transition-colors scale-95 duration-100">arrow_back</button>
<h1 class="font-headline-md text-headline-md font-bold text-on-surface dark:text-on-background">API Lab</h1>
</div>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed hover:bg-surface-variant/50 p-2 rounded-lg transition-colors">notifications</span>
<div class="w-10 h-10 rounded-full border-2 border-on-surface overflow-hidden">
<img alt="User" data-alt="A professional 3D avatar of a software developer with a friendly expression, styled in a minimalist soft-brutalist aesthetic. The character has clean lines, pastel-colored clothing, and is set against a soft, bright studio lighting background that matches the light mode UI. The overall mood is optimistic and approachable." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAsa0nMbHbUjWCQkPl9fpik6LqcRlCs9itxspv9GKQ-wySYBWd3nx3bWromtScxVHejWRko8-AXEgwWvq5-JGd6lWqgqrUlQGFy4xh04bTjpQNgi9Z1yDKnOQGk-DP9qcOZs-MFMSREkib5_5ZfXndKNIYcXrb7_IhEs3XhNtupmVD-hVLk-8esifUnYDESKri6VcO7lHXSrx4-6cxHsxK1ogFHF0WNhB0qg4UOSaCWLlFrRNfkfwnIR4e3NxECSZZaYxCmtYPDpAM"/>
</div>
</div>
</header>
<main class="px-margin-mobile mt-lg max-w-2xl mx-auto">
<!-- New Collection Heading -->
<div class="mb-lg">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">New Collection</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Group your API requests into a organized workspace.</p>
</div>
<!-- Form Container -->
<div class="space-y-md">
<!-- Project Illustration / Hero Card -->
<div class="bg-primary-container border-2 border-on-surface rounded-xl p-md flex items-center gap-md soft-shadow">
<div class="w-16 h-16 bg-surface-container-lowest border-2 border-on-surface rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 0;">folder_open</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-primary-container">Workspace Setup</h3>
<p class="font-body-sm text-body-sm text-on-primary-container/80">Configure your collection details below.</p>
</div>
</div>
<!-- Input: Project Name -->
<div class="flex flex-col gap-base">
<label class="font-button-text text-button-text text-on-surface pl-xs">Project Name</label>
<input class="w-full h-14 bg-surface-container-low border-2 border-on-surface rounded-xl px-md font-body-lg focus:ring-0 focus:border-primary transition-all placeholder:text-outline-variant" placeholder="e.g. Payment Gateway API" style="border-width: 2px;" type="text"/>
</div>
<!-- Input: Description -->
<div class="flex flex-col gap-base">
<label class="font-button-text text-button-text text-on-surface pl-xs">Description (Optional)</label>
<textarea class="w-full bg-surface-container-low border-2 border-on-surface rounded-xl p-md font-body-lg focus:ring-0 focus:border-primary transition-all placeholder:text-outline-variant resize-none" placeholder="What is this collection for?" rows="4" style="border-width: 2px;"></textarea>
</div>
<!-- Method Selection Chips (Bubbly Visuals) -->
<div class="flex flex-col gap-base">
<label class="font-button-text text-button-text text-on-surface pl-xs">Initial Template</label>
<div class="flex flex-wrap gap-sm">
<button class="px-md py-sm bg-tertiary-container border-2 border-on-surface rounded-full font-button-text text-on-tertiary-container hover:bg-tertiary-fixed-dim transition-colors flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">empty_dashboard</span> Empty
                    </button>
<button class="px-md py-sm bg-surface-container-lowest border-2 border-on-surface rounded-full font-button-text text-on-surface-variant hover:bg-secondary-container/20 transition-colors flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">bolt</span> REST API
                    </button>
<button class="px-md py-sm bg-surface-container-lowest border-2 border-on-surface rounded-full font-button-text text-on-surface-variant hover:bg-secondary-container/20 transition-colors flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">hub</span> GraphQL
                    </button>
</div>
</div>
<!-- Visual Separator -->
<div class="py-sm">
<div class="border-t-2 border-dotted border-outline-variant"></div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-md pt-base">
<button class="flex-1 bg-primary text-on-primary font-button-text text-button-text py-md rounded-xl border-2 border-on-surface soft-shadow btn-active transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
                    Create Project
                </button>
<button class="sm:w-1/3 bg-surface-container-lowest text-on-surface font-button-text text-button-text py-md rounded-xl border-2 border-on-surface soft-shadow btn-active transition-all">
                    Cancel
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Hidden on desktop as per Shell Visibility rules) -->
<nav class="md:hidden fixed bottom-md left-0 right-0 mx-margin-mobile z-50 flex justify-around items-center h-[72px] bg-surface-container-lowest border-2 border-on-surface rounded-xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
<div class="text-on-surface-variant p-2 hover:bg-secondary-container/20 rounded-lg">
<span class="material-symbols-outlined">dashboard</span>
</div>
<div class="bg-primary-container text-on-primary-container rounded-lg p-2 border-2 border-on-surface translate-y-[2px] translate-x-[2px] shadow-none">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">api</span>
</div>
<div class="text-on-surface-variant p-2 hover:bg-secondary-container/20 rounded-lg">
<span class="material-symbols-outlined">settings_ethernet</span>
</div>
</nav>
</body></html>
