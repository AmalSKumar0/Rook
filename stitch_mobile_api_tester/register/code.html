<body class="bg-background text-on-background min-h-screen font-body-lg text-body-lg dot-grid selection:bg-primary-container">
<!-- Suppression of Navigation Shell for Transactional Registration Page -->
<main class="flex flex-col items-center justify-center min-h-screen px-margin-mobile py-xl relative overflow-hidden">
<!-- Bubbly Decorative Accents -->
<div class="absolute -top-20 -left-20 w-64 h-64 bg-secondary-container rounded-full blur-3xl opacity-40 -z-10"></div>
<div class="absolute top-1/4 -right-10 w-48 h-48 bg-primary-container rounded-full blur-3xl opacity-30 -z-10"></div>
<div class="absolute -bottom-10 left-1/3 w-80 h-80 bg-tertiary-container rounded-full blur-3xl opacity-20 -z-10"></div>
<!-- Registration Container -->
<div class="w-full max-w-[440px] bg-white border-2 border-on-surface rounded-[24px] offset-shadow p-lg z-10 flex flex-col gap-lg">
<!-- Branding/Icon Section -->
<div class="flex justify-between items-start">
<div class="w-14 h-14 bg-primary-container border-2 border-on-surface rounded-xl flex items-center justify-center offset-shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">api</span>
</div>
<div class="text-right">
<p class="font-code-label text-code-label text-outline uppercase tracking-widest">Version 2.4.0</p>
</div>
</div>
<!-- Header -->
<div class="flex flex-col gap-xs">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Create Account</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Join the community of developers building the future of API integration.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Full Name Field -->
<div class="flex flex-col gap-base">
<label class="font-button-text text-button-text px-xs">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary">person</span>
<input class="w-full pl-xl pr-md py-md bg-surface-bright border-2 border-on-surface rounded-xl font-body-lg text-body-lg outline-none focus:border-[3px] focus:ring-0 transition-all placeholder:text-outline-variant" placeholder="Alex Rivera" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-base">
<label class="font-button-text text-button-text px-xs">Work Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary">mail</span>
<input class="w-full pl-xl pr-md py-md bg-surface-bright border-2 border-on-surface rounded-xl font-body-lg text-body-lg outline-none focus:border-[3px] focus:ring-0 transition-all placeholder:text-outline-variant" placeholder="alex@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-base">
<label class="font-button-text text-button-text px-xs">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary">lock</span>
<input class="w-full pl-xl pr-md py-md bg-surface-bright border-2 border-on-surface rounded-xl font-body-lg text-body-lg outline-none focus:border-[3px] focus:ring-0 transition-all placeholder:text-outline-variant" placeholder="••••••••••••" type="password"/>
</div>
<p class="font-body-sm text-body-sm text-outline-variant px-xs">Minimum 8 characters with at least one symbol.</p>
</div>
<!-- Submit Button -->
<button class="mt-base bg-primary-container text-on-primary-container font-button-text text-button-text py-md rounded-xl border-2 border-on-surface offset-shadow-sm active-click transition-all flex items-center justify-center gap-base" type="button">
<span>Sign Up</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Social/Alt Signup (Bento Style) -->
<div class="grid grid-cols-2 gap-sm">
<button class="bg-white border-2 border-on-surface p-base rounded-xl flex items-center justify-center gap-xs offset-shadow-sm active-click transition-all">

<span class="font-button-text text-button-text">Google</span>
</button>
<button class="bg-white border-2 border-on-surface p-base rounded-xl flex items-center justify-center gap-xs offset-shadow-sm active-click transition-all">
<span class="material-symbols-outlined text-xl">terminal</span>
<span class="font-button-text text-button-text">GitHub</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center pt-base">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2" href="#">Log In</a>
</p>
</div>
</div>
<!-- Aesthetic Footer Component -->
<div class="mt-lg flex items-center gap-md">
<div class="flex -space-x-2">
<img class="w-8 h-8 rounded-full border-2 border-on-surface object-cover" data-alt="A professional studio portrait of a young tech professional with a friendly smile, clean soft lighting, set against a minimal light-grey studio background. The aesthetic is modern and high-key, maintaining the clean light-mode visual identity of the API Lab application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6MzBRYZxG4onY7n5-SL0TCL351kZ8PY6PHT7IalZz7Y7b5ovfUtyq1ALyZ5ROQXoNAE68D4BriBn8drH4D3aGcEoANiwXEa-TMFzwIDMV5EoNYrSUbhMXZjVXt6GoZt00L16CCDrFkj7naWTKoeVFRAlRpwKbsE7fqe9a1gKNlckYOQvlnBsftQlQ0s8wZwFWvwzQ5jMKIQXa0i_rEoV8LTZor3TMQM7rrWEQxth5r2PfFx9ZEsTyWI69FN0yTlvxVmJouhlehHQ"/>

<div class="w-8 h-8 rounded-full border-2 border-on-surface bg-secondary-container flex items-center justify-center text-[10px] font-bold">+12k</div>
</div>
<p class="font-body-sm text-body-sm text-outline">Joined by 12,000+ developers</p>
</div>
</main>
